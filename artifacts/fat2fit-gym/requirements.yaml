packages:
  "framer-motion": "For high-end scroll animations, 3D hover effects, and page transitions"
  "three": "Required peer dependency for 3D elements"
  "@react-three/fiber": "React renderer for Three.js to render the 3D hero background"
  "@react-three/drei": "Useful helpers for React Three Fiber (Stars, Float, etc.)"
  "embla-carousel-react": "For the auto-rotating testimonials slider"
  "embla-carousel-autoplay": "Plugin for auto-playing the testimonials slider"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility to merge tailwind classes"

images:
